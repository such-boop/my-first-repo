name: Manual Test Run
on:
  workflow_dispatch:

jobs:
    run-tests:
        runs-on: ubuntu-latest
        steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-node@v4
          with:
            node-version: '24.x'
        - name: Install dependencies
          run: npm install
        - name: Install Playwright Browsers
          run: npx playwright install --with-deps
        - name: Run UI tests 
          run: npm run tests:ui -- --reporter=html 
          env: 
            PLAYWRIGHT_HTML_REPORT: playwright-report-ui
        - name: Run API tests
          run: npm run tests:api -- --reporter=html 
          env: 
            PLAYWRIGHT_HTML_REPORT: playwright-report-api
        - name: Upload UI test report 
          if: always() 
          uses: actions/upload-artifact@v4 
          with: 
            name: playwright-report-ui 
            path: playwright-report-ui
            retention-days: 7
        - name: Upload API test report 
          if: always() 
          uses: actions/upload-artifact@v4 
          with: 
            name: playwright-report-api 
            path: playwright-report-api
            retention-days: 7